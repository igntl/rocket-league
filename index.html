<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة روكيت ليق | سيرفر تيتانيوم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #030708; }
        .glow-logo { filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.25)) drop-shadow(0 0 40px rgba(234, 179, 8, 0.15)); }
        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .text-gradient { background: linear-gradient(135deg, #10b981 0%, #34d399 40%, #fbbf24 80%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* تحسين التجاوب للجداول */
        @media (max-width: 640px) {
            .responsive-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">

    <header class="border-b border-emerald-950 bg-[#070e10] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img src="https://i.postimg.cc/x1SCyrr2/Screenshot-48-Photoroom.png" class="h-8 w-auto" alt="Logo">
                <div class="font-extrabold text-xl text-emerald-400">TITANIUM</div>
            </div>
            
            <nav class="flex gap-1.5 bg-[#030708] p-1 rounded-xl border border-emerald-950/60 overflow-x-auto">
                <button onclick="switchTab('home')" id="btn-home" class="nav-btn px-4 py-2 rounded-lg bg-emerald-700 text-white font-bold transition">الرئيسية</button>
                <button onclick="switchTab('register')" id="btn-register" class="nav-btn px-4 py-2 rounded-lg hover:bg-emerald-950/40 text-gray-300 transition">التسجيل</button>
                <button onclick="switchTab('teams')" id="btn-teams" class="nav-btn px-4 py-2 rounded-lg hover:bg-emerald-950/40 text-gray-300 transition">المسجلين</button>
                <button onclick="switchTab('rules')" id="btn-rules" class="nav-btn px-4 py-2 rounded-lg hover:bg-emerald-950/40 text-gray-300 transition">القوانين</button>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10 flex-grow w-full">
        <!-- الأقسام الرئيسية كما هي مع تحسين الفراغات -->
        <section id="page-home" class="tab-content space-y-10 text-center">
            <!-- محتوى الصفحة الرئيسية -->
             <div class="flex justify-center"><div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-500/10 text-emerald-400 text-sm border border-emerald-500/20">التسجيل مفتوح الآن - متبقي <span id="remainingCount" class="text-yellow-400 font-bold">64</span> مقعد</div></div>
             <h1 class="text-4xl md:text-6xl font-black text-gradient">بطولة تيتانيوم لروكيت ليق</h1>
             <p class="text-gray-400 max-w-xl mx-auto">الحماس واصل والجلد حاصل، ارفع الـ Boost وسجّل حضورك.</p>
        </section>

        <!-- باقي الأقسام تتبع نفس الهيكل -->
        <section id="page-register" class="tab-content hidden space-y-6">
            <!-- نموذج التسجيل -->
        </section>

        <section id="page-teams" class="tab-content hidden space-y-6">
            <div class="bg-[#070e10] border border-emerald-950 rounded-2xl p-4 overflow-x-auto">
                <table class="w-full text-right border-collapse responsive-table" id="teamsTable">
                    <thead><tr class="border-b border-emerald-950 text-emerald-400">
                        <th class="p-4">الفريق</th>
                        <th class="p-4">اللاعب الأول</th>
                        <th class="p-4">اللاعب الثاني</th>
                        <th class="p-4">الإدارة</th>
                    </tr></thead>
                    <tbody id="teamsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // دالة التبديل المحسنة
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`page-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = 'nav-btn px-4 py-2 rounded-lg hover:bg-emerald-950/40 text-gray-300 transition';
            });
            document.getElementById(`btn-${tabId}`).className = 'nav-btn px-4 py-2 rounded-lg bg-emerald-700 text-white font-bold transition';
        }

        // إعدادات Firebase والتعامل مع البيانات
        const firebaseConfig = { databaseURL: "https://roucket-30506-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // دالة عرض الفرق مع تحسين الكود
        database.ref('teams').on('value', (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('teamsTableBody');
            tbody.innerHTML = '';
            
            if (!data) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">لا توجد فرق مسجلة.</td></tr>';
                return;
            }

            Object.entries(data).forEach(([key, team], index) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-emerald-950/30';
                row.innerHTML = `
                    <td class="p-4 text-emerald-400 font-bold">#${index + 1}</td>
                    <td class="p-4">${team.p1Discord} <br><span class="text-xs text-yellow-600">${team.p1Epic}</span></td>
                    <td class="p-4">${team.p2Discord} <br><span class="text-xs text-yellow-600">${team.p2Epic}</span></td>
                    <td class="p-4 flex gap-2">
                        <button onclick="deleteTeam('${key}')" class="text-red-400 hover:text-red-600 text-xs">حذف</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        });

        function deleteTeam(id) {
            const pin = prompt("أدخل رمز الإدارة:");
            if (pin === "0595") database.ref('teams/' + id).remove();
            else alert("رمز خاطئ!");
        }
    </script>
</body>
</html>
